<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D4654A" />
  <title>Rezept-Finder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <style>
    html, body { margin: 0; padding: 0; background: #FDF6F0; }
    body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    #boot-message {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; color: #7A6B6B; font-size: 14px; text-align: center; padding: 24px;
    }
    #boot-message .spinner {
      width: 36px; height: 36px; border: 3px solid #E8DDD5;
      border-top-color: #D4654A; border-radius: 50%;
      animation: spin 0.9s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #boot-error {
      max-width: 480px; background: #FEE; border: 1px solid #D44; color: #922;
      padding: 16px 20px; border-radius: 12px; font-size: 13px; text-align: left;
      white-space: pre-wrap; word-break: break-word;
    }
  </style>

  <!--
    Import-Map: "react" und "react-dom/client" werden aus esm.sh geladen.
    esm.sh liefert React als ES-Modul, so dass `import { useState } from "react"` funktioniert.
  -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/[email protected]",
      "react-dom/client": "https://esm.sh/[email protected]/client"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div id="boot-message">
      <div class="spinner"></div>
      <div>Rezept-Finder wird geladen…</div>
    </div>
  </div>

  <!-- Babel-Standalone kompiliert JSX im Browser -->
  <script src="https://unpkg.com/@babel/[email protected]/babel.min.js"></script>

  <!--
    Lade die JSX-Datei, transpiliere JSX zu JS und führe sie als ES-Modul aus.
    So bleiben `import`/`export` erhalten und die Import-Map wird angewendet.
  -->
  <script>
    (async function () {
      try {
        const res = await fetch('./Rezept-Finder.jsx');
        if (!res.ok) throw new Error('Rezept-Finder.jsx nicht gefunden (' + res.status + ')');
        const source = await res.text();

        // JSX -> JS (als ES-Modul, Import-Befehle bleiben erhalten)
        const compiled = Babel.transform(source, {
          presets: [['react', { runtime: 'classic' }]],
          sourceType: 'module',
        }).code;

        // Als Blob-URL laden, damit importmap greift und import/export funktionieren
        const blob = new Blob([compiled], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);

        const mod = await import(url);
        const App = mod.default;
        if (!App) throw new Error('Kein default export in Rezept-Finder.jsx gefunden.');

        const React = await import('react');
        const { createRoot } = await import('react-dom/client');

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      } catch (e) {
        const el = document.getElementById('root');
        el.innerHTML =
          '<div id="boot-message"><div id="boot-error">' +
          '<strong>Die App konnte nicht geladen werden.</strong><br><br>' +
          (e && e.message ? String(e.message) : String(e)) +
          '<br><br>Bitte Seite neu laden. Bleibt der Fehler: Konsole öffnen (F12).' +
          '</div></div>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>

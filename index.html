<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D4654A" />
  <title>Rezept-Finder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <style>
    html, body { margin: 0; padding: 0; background: #FDF6F0; }
    body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    #boot-message {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; color: #7A6B6B; font-size: 14px; text-align: center; padding: 24px;
    }
    #boot-message .spinner {
      width: 36px; height: 36px; border: 3px solid #E8DDD5;
      border-top-color: #D4654A; border-radius: 50%;
      animation: spin 0.9s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #boot-error {
      max-width: 480px; background: #FEE; border: 1px solid #D44; color: #922;
      padding: 16px 20px; border-radius: 12px; font-size: 13px; text-align: left;
      white-space: pre-wrap; word-break: break-word;
    }
  </style>

  <!-- Import-Map: löst `import "react"` zur Laufzeit auf esm.sh um -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/[email protected]",
      "react-dom/client": "https://esm.sh/[email protected]/client"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div id="boot-message">
      <div class="spinner"></div>
      <div id="boot-status">Rezept-Finder wird geladen…</div>
    </div>
  </div>

  <!--
    Babel-Standalone: zwei CDNs (Primär + Fallback), beide synchron geladen.
    "onerror" auf dem ersten Script probiert den Fallback. Nur wenn beide fehlschlagen,
    zeigen wir dem User einen klaren Hinweis.
  -->
  <script>
    window.__babelLoaded = false;
    window.__babelError = null;
  </script>
  <script
    src="https://unpkg.com/@babel/[email protected]/babel.min.js"
    onload="window.__babelLoaded = true;"
    onerror="(function(){
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/@babel/[email protected]/babel.min.js';
      s.onload=function(){window.__babelLoaded=true;};
      s.onerror=function(){window.__babelError='Babel konnte von keinem CDN geladen werden (unpkg.com und jsdelivr.net beide blockiert oder offline).';};
      document.head.appendChild(s);
    })();"
  ></script>

  <script>
    (async function () {
      const setStatus = (txt) => {
        const el = document.getElementById('boot-status');
        if (el) el.textContent = txt;
      };
      const showError = (msg) => {
        const el = document.getElementById('root');
        el.innerHTML =
          '<div id="boot-message"><div id="boot-error">' +
          '<strong>Die App konnte nicht geladen werden.</strong><br><br>' +
          String(msg).replace(/</g, '&lt;') +
          '<br><br>Bitte Seite neu laden (Strg+F5). Bleibt der Fehler: Konsole öffnen (F12) und Fehler prüfen.' +
          '</div></div>';
      };

      try {
        // 1) Warten, bis Babel-Standalone wirklich bereit ist (max. 15 Sek.)
        setStatus('Babel wird geladen…');
        const maxWait = 15000;
        const start = Date.now();
        while (!window.__babelLoaded && !window.__babelError) {
          if (Date.now() - start > maxWait) {
            throw new Error('Babel lädt zu lange — Verbindung zu unpkg.com/jsdelivr.net prüfen.');
          }
          await new Promise((r) => setTimeout(r, 100));
        }
        if (window.__babelError) throw new Error(window.__babelError);
        if (typeof Babel === 'undefined') throw new Error('Babel ist geladen, aber nicht verfügbar — unbekannter Fehler.');

        // 2) JSX-Datei holen
        setStatus('Rezept-Finder.jsx wird geladen…');
        const res = await fetch('./Rezept-Finder.jsx');
        if (!res.ok) {
          throw new Error('Rezept-Finder.jsx nicht gefunden (HTTP ' + res.status + '). Die Datei muss im selben Ordner wie index.html liegen.');
        }
        const source = await res.text();

        // 3) JSX -> JS kompilieren (als ES-Modul, damit import/export funktionieren)
        setStatus('App wird kompiliert…');
        const compiled = Babel.transform(source, {
          presets: [['react', { runtime: 'classic' }]],
          sourceType: 'module',
        }).code;

        // 4) Als Blob-Modul laden, damit importmap greift
        const blob = new Blob([compiled], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const mod = await import(url);
        const App = mod.default;
        if (!App) throw new Error('Kein default export in Rezept-Finder.jsx gefunden.');

        // 5) React laden und App rendern
        setStatus('App wird gestartet…');
        const React = await import('react');
        const { createRoot } = await import('react-dom/client');
        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      } catch (e) {
        showError((e && e.message) ? e.message : e);
        console.error(e);
      }
    })();
  </script>
</body>
</html>

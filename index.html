<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D4654A" />
  <title>Rezept-Finder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <style>
    html, body { margin: 0; padding: 0; background: #FDF6F0; }
    body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    #boot-message {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; color: #7A6B6B; font-size: 14px; text-align: center; padding: 24px;
    }
    #boot-message .spinner {
      width: 36px; height: 36px; border: 3px solid #E8DDD5;
      border-top-color: #D4654A; border-radius: 50%;
      animation: spin 0.9s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #boot-error {
      max-width: 480px; background: #FEE; border: 1px solid #D44; color: #922;
      padding: 16px 20px; border-radius: 12px; font-size: 13px; text-align: left;
      white-space: pre-wrap; word-break: break-word;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18/client"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div id="boot-message">
      <div class="spinner"></div>
      <div id="boot-status">Rezept-Finder wird geladen…</div>
    </div>
  </div>

  <script>
    window.__babelLoaded = false;
    window.__babelError = null;
  </script>
  <script
    src="https://unpkg.com/@babel/standalone/babel.min.js"
    onload="window.__babelLoaded = true;"
    onerror="(function(){
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js';
      s.onload=function(){window.__babelLoaded=true;};
      s.onerror=function(){window.__babelError='Babel konnte von keinem CDN geladen werden.';};
      document.head.appendChild(s);
    })();"
  ></script>

  <script>
    (async function () {
      const setStatus = (txt) => {
        const el = document.getElementById('boot-status');
        if (el) el.textContent = txt;
      };
      const showError = (msg) => {
        const el = document.getElementById('root');
        el.innerHTML =
          '<div id="boot-message"><div id="boot-error">' +
          '<strong>Die App konnte nicht geladen werden.</strong><br><br>' +
          String(msg).replace(/</g, '&lt;') +
          '<br><br>Bitte Seite neu laden (Strg+F5). Bleibt der Fehler: Konsole öffnen (F12) und Fehler prüfen.' +
          '</div></div>';
      };

      try {
        // 1) Warten auf Babel
        setStatus('Babel wird geladen…');
        const maxWait = 15000;
        const start = Date.now();
        while (!window.__babelLoaded && !window.__babelError) {
          if (Date.now() - start > maxWait) {
            throw new Error('Babel lädt zu lange — Verbindung prüfen.');
          }
          await new Promise((r) => setTimeout(r, 100));
        }
        if (window.__babelError) throw new Error(window.__babelError);
        if (typeof Babel === 'undefined') throw new Error('Babel nicht verfügbar.');

        // 2) JSX-Datei holen — explizit als ArrayBuffer, damit wir UTF-8 sauber dekodieren
        setStatus('Rezept-Finder.jsx wird geladen…');
        const res = await fetch('./Rezept-Finder.jsx', { cache: 'no-store' });
        if (!res.ok) {
          throw new Error('Rezept-Finder.jsx nicht gefunden (HTTP ' + res.status + ').');
        }
        const buffer = await res.arrayBuffer();
        // Zwangsweise UTF-8 dekodieren
        let source = new TextDecoder('utf-8').decode(buffer);
        // UTF-8 BOM entfernen, falls vorhanden (Babel kann BOM nicht verarbeiten)
        if (source.charCodeAt(0) === 0xFEFF) {
          source = source.slice(1);
        }

        // 3) Kodierungs-Check: Enthält die Datei kaputte Umlaute?
        if (/Ã¶|Ã¤|Ã¼|ÃŸ|â€¦|ðŸ|â€|Â·/.test(source)) {
          throw new Error('Die Rezept-Finder.jsx hat eine kaputte Zeichenkodierung (Mojibake). Bitte die Datei neu aus dem Chat herunterladen und ins Repo hochladen — ohne sie zwischendurch in einem Editor zu öffnen, der UTF-8 nicht unterstützt.');
        }

        // 4) JSX → JS kompilieren
        setStatus('App wird kompiliert…');
        const compiled = Babel.transform(source, {
          presets: [['react', { runtime: 'automatic' }]],
          sourceType: 'module',
        }).code;

        // 5) Als ES-Modul laden
        const blob = new Blob([compiled], { type: 'text/javascript;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const mod = await import(url);
        const App = mod.default;
        if (!App) throw new Error('Kein default export in Rezept-Finder.jsx gefunden.');

        // 6) App rendern
        setStatus('App wird gestartet…');
        const { createElement } = await import('react');
        const { createRoot } = await import('react-dom/client');
        const root = createRoot(document.getElementById('root'));
        root.render(createElement(App));
      } catch (e) {
        showError((e && e.message) ? e.message : e);
        console.error(e);
      }
    })();
  </script>
</body>
</html>
